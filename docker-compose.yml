services:
  frontend:
    build:
      context: .
      target: frontend
      secrets:
        - npmrc
    container_name: readtrack-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    networks:
      - readtrack-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: .
      target: backend
      secrets:
        - npmrc
    container_name: readtrack-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    networks:
      - readtrack-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  readtrack-net:
    driver: bridge

secrets:
  npmrc:
    file: ${USERPROFILE}/.npmrc
