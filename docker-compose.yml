services:
  frontend:
    build:
      context: .
      target: frontend
      secrets:
        - npmrc
    container_name: readtrack-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
      secrets:
        - npmrc
    container_name: readtrack-backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

secrets:
  npmrc:
    file: ${USERPROFILE}/.npmrc
