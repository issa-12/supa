# ── HTTP: redirect everything to HTTPS ────────────────────────
server {
  listen 80;
  server_name _;

  # Plain-HTTP health endpoint for the Docker healthcheck (no TLS,
  # no redirect) so the container can report ready without a cert.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    # HTTPS is published on host port 8443 (see docker-compose), so redirect
    # there. If you publish on the standard 443, change this back to $host.
    return 301 https://$host:8443$request_uri;
  }
}

# ── HTTPS: serves the SPA and proxies the API ─────────────────
server {
  listen 443 ssl;
  http2 on;
  server_name _;

  ssl_certificate     /etc/nginx/certs/selfsigned.crt;
  ssl_certificate_key /etc/nginx/certs/selfsigned.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  # Force HTTPS for a year on this host (and subdomains).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Gzip compression ──────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml
    font/woff2;

  # ── Security headers ──────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;
  # CSP must match the external sources index.html actually loads:
  #  - script: cdn.jsdelivr.net (iconify-icon web component)
  #  - fonts: self-hosted PT Serif (public/fonts) — no external font CDN
  #  - connect: Supabase (REST + realtime wss) + iconify API hosts (icon data)
  #  - img https:/data:/blob: covers Google Books + OpenLibrary covers + avatars
  # NOTE: this header is repeated in `location = /index.html` below — keep both in sync.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://code.iconify.design 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # Avatar uploads stream directly to Supabase Storage, but if anything
  # ever goes through /api/ we want a reasonable cap (Supabase has its
  # own 50 MB limit; this matches the frontend's 5 MB UI check).
  client_max_body_size 8m;

  # ── Service worker control files must NOT be cached ───────────
  # ngsw-worker.js / ngsw.json have FIXED (un-hashed) names; caching them
  # immutable would freeze the app and block PWA updates. Must come before the
  # generic .js rule below (first matching regex location wins).
  location ~* ^/(ngsw-worker\.js|ngsw\.json|safety-worker\.js|worker-basic\.min\.js)$ {
    add_header Cache-Control "no-cache";
    expires off;
    access_log off;
  }

  # The web app manifest changes rarely but should revalidate, and needs the
  # correct MIME type (nginx's default mime.types has no .webmanifest entry).
  location = /manifest.webmanifest {
    add_header Cache-Control "no-cache";
    default_type application/manifest+json;
    expires off;
  }

  # ── Cache hashed static assets forever (Angular hashes filenames) ─
  location ~* \.(js|css|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Never cache images (they may change) ──────────────────────
  location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  # ── Never cache the HTML entry point ──────────────────────────
  # nginx drops server-level add_headers in any location that sets its
  # own, so the security headers + HSTS + CSP are repeated here to ensure
  # they reach the browser on the document response (and every SPA route,
  # which try_files rewrites to /index.html).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://code.iconify.design 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.iconify.design https://api.simplesvg.com https://api.unisvg.com; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
  }

  # ── Backend proxy ─────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Angular SPA fallback ──────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
