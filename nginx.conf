server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Gzip compression ──────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    image/svg+xml
    font/woff2;

  # ── Security headers ──────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;
  # CSP: allow self-hosted assets + Supabase (REST + realtime websocket),
  # Google Books covers, OpenLibrary covers (seed data), avatar fallback,
  # and the iconify CDN used by the top-nav icons.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://code.iconify.design 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.iconify.design; font-src 'self' data:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

  # Avatar uploads stream directly to Supabase Storage, but if anything
  # ever goes through /api/ we want a reasonable cap (Supabase has its
  # own 50 MB limit; this matches the frontend's 5 MB UI check).
  client_max_body_size 8m;

  # ── Cache hashed static assets forever (Angular hashes filenames) ─
  location ~* \.(js|css|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Never cache images (they may change) ──────────────────────
  location ~* \.(png|jpg|jpeg|gif|webp|ico|svg)$ {
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
  }

  # ── Never cache the HTML entry point ──────────────────────────
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ── Backend proxy ─────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
  }

  # ── Angular SPA fallback ──────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
