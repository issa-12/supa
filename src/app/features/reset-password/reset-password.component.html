<main class="reset-page">
  <div class="background" aria-hidden="true">
    <div class="background__overlay"></div>
  </div>

  <section class="reset-card">
    @if (!sessionReady && !sessionError) {
      <div class="reset-state">
        <div class="spinner"></div>
        <p>Verifying reset link…</p>
      </div>
    } @else if (sessionError) {
      <div class="reset-state">
        <div class="reset-icon reset-icon--error" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
        </div>
        <h2 class="reset-title">Link invalid</h2>
        <p class="reset-message">{{ sessionError }}</p>
        <button type="button" class="reset-submit" (click)="router.navigateByUrl('/')">
          Back to login
        </button>
      </div>
    } @else {
      <div class="reset-icon" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>

      <h2 class="reset-title">Set a new password</h2>
      <p class="reset-subtitle">Enter and confirm your new password below.</p>

      <form class="reset-form" (ngSubmit)="submit()">
        <div class="reset-field">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="reset-input"
            placeholder="New password"
            [(ngModel)]="password"
            name="password"
            autocomplete="new-password"
            [disabled]="submitting"
            required
            minlength="6"
          />
          <button
            type="button"
            class="reset-eye"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            tabindex="-1"
          >
            @if (showPassword) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>

        <div class="reset-field">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="reset-input"
            placeholder="Confirm new password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            autocomplete="new-password"
            [disabled]="submitting"
            required
            minlength="6"
          />
          <button
            type="button"
            class="reset-eye"
            (click)="toggleConfirmPassword()"
            [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
            tabindex="-1"
          >
            @if (showConfirmPassword) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            }
          </button>
        </div>

        @if (errorMessage) {
          <p class="reset-msg reset-msg--error">{{ errorMessage }}</p>
        }
        @if (successMessage) {
          <p class="reset-msg reset-msg--ok">{{ successMessage }}</p>
        }

        <button
          type="submit"
          class="reset-submit"
          [disabled]="submitting || !password || !confirmPassword"
        >
          {{ submitting ? 'Updating…' : 'Change password' }}
        </button>
      </form>
    }
  </section>
</main>
