<div class="app-viewport">
  <app-top-nav></app-top-nav>

  <div class="scroll-area">
    <div class="page-shell">

      <!-- ── Main column ─────────────────────────────────────── -->
      <main class="main-col">

        <!-- Hero (driven by the first recommendation) -->
        <div *ngIf="isLoadingRecommended" class="hero-skeleton">
          <div class="hero-skel-content">
            <div class="skel-pill skeleton"></div>
            <div class="skel-h1 skeleton"></div>
            <div class="skel-line skeleton"></div>
            <div class="skel-line skeleton"></div>
            <div class="skel-line-short skeleton"></div>
            <div class="skel-actions">
              <div class="skel-btn skeleton"></div>
              <div class="skel-btn skeleton"></div>
            </div>
          </div>
          <div class="skel-hero-cover skeleton"></div>
        </div>
        <app-hero-section
          *ngIf="!isLoadingRecommended && heroBook"
          [book]="heroBook"
          [genre]="favoriteGenre"
          [currentUserId]="currentUserId"
          (addToReading)="onHeroAdded()"
        ></app-hero-section>

        <!-- Recommended for You -->
        <div *ngIf="isLoadingRecommended" class="home-section-skeleton">
          <div class="skel-h2 skeleton"></div>
          <div class="skel-rec-grid">
            <div *ngFor="let i of [1,2,3,4,5,6]" class="skel-rec-card">
              <div class="skel-rec-cover skeleton"></div>
              <div class="skel-rec-info">
                <div class="skel-line skeleton"></div>
                <div class="skel-line-short skeleton"></div>
                <div class="skel-pill skeleton"></div>
              </div>
            </div>
          </div>
        </div>
        <app-recommended-books *ngIf="!isLoadingRecommended" [books]="recommendedBooks" (addBook)="onAddBook($event)"></app-recommended-books>

        <!-- Trending This Week -->
        <div *ngIf="isLoadingTrending" class="home-section-skeleton">
          <div class="skel-h2 skeleton"></div>
          <div class="skel-trending-row">
            <div *ngFor="let i of [1,2,3,4,5]" class="skel-trending-card">
              <div class="skel-trending-cover skeleton"></div>
              <div class="skel-line skeleton"></div>
              <div class="skel-line-short skeleton"></div>
            </div>
          </div>
        </div>
        <app-trending-books *ngIf="!isLoadingTrending" [books]="trendingBooks"></app-trending-books>
      </main>

      <!-- ── Community sidebar ───────────────────────────────── -->
      <aside class="side-col">
        <app-posts-feed
          [currentUserId]="currentUserId"
          [currentUserAvatar]="currentUserAvatar"
          [currentUserName]="currentUser?.name ?? null"
        ></app-posts-feed>
      </aside>

    </div>
  </div>
</div>
